<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>專案趕工（Crashing）互動模擬器</title>
<style>
  :root {
    --primary: #1a5276;
    --secondary: #2980b9;
    --accent: #e74c3c;
    --success: #27ae60;
    --warning: #f39c12;
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #2c3e50;
    --muted: #7f8c8d;
    --border: #dce1e7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  .header {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: white;
    padding: 28px 32px;
    text-align: center;
  }
  .header h1 { font-size: 28px; margin-bottom: 6px; }
  .header p { opacity: 0.85; font-size: 15px; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .card {
    background: var(--card);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid var(--border);
  }
  .card h2 {
    font-size: 20px;
    color: var(--primary);
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--secondary);
  }

  /* Tables */
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    margin: 10px 0;
  }
  th, td {
    padding: 10px 12px;
    text-align: center;
    border: 1px solid var(--border);
  }
  th {
    background: var(--primary);
    color: white;
    font-weight: 600;
  }
  tbody tr:nth-child(even) { background: #f8f9fa; }
  tbody tr:hover { background: #eef3f8; }
  .crashed-cell { color: var(--accent); font-weight: bold; }

  /* Status bar */
  .status-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }
  .stat-box {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .stat-box .label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-box .value { font-size: 26px; font-weight: 700; color: var(--primary); }
  .stat-box.highlight .value { color: var(--accent); }
  .stat-box.optimum { border-color: var(--success); background: #eafaf1; }
  .stat-box.optimum .value { color: var(--success); }

  /* Crash panel */
  .cp-list {
    background: #fef9e7;
    border: 1px solid #f9e79f;
    border-radius: 8px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .cp-list h4 { font-size: 14px; color: var(--warning); margin-bottom: 8px; }
  .cp-item {
    font-size: 13px;
    padding: 4px 0;
    font-family: monospace;
    letter-spacing: 1px;
  }
  .cp-item.is-critical { color: var(--accent); font-weight: bold; }

  .crash-option {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin: 6px 0;
    border: 2px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 14px;
  }
  .crash-option:hover { border-color: var(--secondary); background: #eef6fc; }
  .crash-option.selected { border-color: var(--accent); background: #fdecea; }
  .crash-option.disabled {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
  }
  .crash-option input[type="checkbox"] {
    width: 18px; height: 18px; accent-color: var(--accent);
  }
  .crash-option .act-name { font-weight: 700; min-width: 30px; }
  .crash-option .act-info { color: var(--muted); font-size: 12px; }
  .crash-option .act-slope { color: var(--accent); font-weight: 600; margin-left: auto; }

  .btn {
    display: inline-block;
    padding: 12px 28px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: var(--secondary); color: white; }
  .btn-primary:hover { background: var(--primary); }
  .btn-primary:disabled { background: #bdc3c7; cursor: not-allowed; }
  .btn-danger { background: var(--accent); color: white; }
  .btn-danger:hover { background: #c0392b; }
  .btn-danger:disabled { background: #bdc3c7; cursor: not-allowed; }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #1e8449; }
  .btn-outline {
    background: transparent;
    color: var(--secondary);
    border: 2px solid var(--secondary);
  }
  .btn-outline:hover { background: var(--secondary); color: white; }
  .btn-group { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }

  .msg {
    padding: 12px 16px;
    border-radius: 8px;
    margin: 10px 0;
    font-size: 14px;
    line-height: 1.5;
  }
  .msg-error { background: #fdecea; color: #c0392b; border: 1px solid #f5c6cb; }
  .msg-success { background: #eafaf1; color: #1e8449; border: 1px solid #a9dfbf; }
  .msg-info { background: #eaf2f8; color: #1a5276; border: 1px solid #aed6f1; }
  .msg-warning { background: #fef9e7; color: #7d6608; border: 1px solid #f9e79f; }

  .history-step {
    padding: 14px;
    margin: 8px 0;
    border-left: 4px solid var(--secondary);
    background: #f8f9fa;
    border-radius: 0 8px 8px 0;
    font-size: 14px;
  }
  .history-step .step-title { font-weight: 700; color: var(--primary); margin-bottom: 4px; }
  .history-step .step-detail { color: var(--muted); font-size: 13px; }

  .chart-container { position: relative; width: 100%; height: 400px; margin: 16px 0; overflow: hidden; }
  .chart-container canvas { display: block; }

  /* Toggle switch for indirect cost */
  .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; font-size: 14px; }
  .toggle-switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc; border-radius: 24px; transition: 0.3s;
  }
  .toggle-slider::before {
    content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px;
    background: white; border-radius: 50%; transition: 0.3s;
  }
  .toggle-switch input:checked + .toggle-slider { background: var(--secondary); }
  .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

  .completion-banner {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    padding: 24px;
    border-radius: 12px;
    text-align: center;
    margin: 16px 0;
  }
  .completion-banner h3 { font-size: 22px; margin-bottom: 8px; }
  .completion-banner p { opacity: 0.9; }

  .two-col { display: grid; grid-template-columns: 57% 1fr; gap: 20px; }
  @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-critical { background: #fdecea; color: var(--accent); }
  .tag-slack { background: #eafaf1; color: var(--success); }
</style>
</head>
<body>

<div class="header">
  <h1>專案趕工（Project Crashing）互動模擬器</h1>
  <p>透過逐步操作，學習如何在成本與時間之間做出最佳取捨</p>
</div>

<div class="container" id="app"></div>

<script>
// ============================================================
// DATA MODEL — Correct network: F predecessors=[C,D], G predecessors=[E,F]
// ============================================================
const ACTIVITIES = {
  A: { name:'A', preds:[],       normalTime:3,  crashTime:2, normalCost:50,  crashCost:70,  slope:20, maxCrash:1 },
  B: { name:'B', preds:['A'],    normalTime:6,  crashTime:4, normalCost:80,  crashCost:160, slope:40, maxCrash:2 },
  C: { name:'C', preds:['A'],    normalTime:10, crashTime:9, normalCost:60,  crashCost:90,  slope:30, maxCrash:1 },
  D: { name:'D', preds:['A'],    normalTime:11, crashTime:7, normalCost:50,  crashCost:150, slope:25, maxCrash:4 },
  E: { name:'E', preds:['B'],    normalTime:8,  crashTime:6, normalCost:100, crashCost:160, slope:30, maxCrash:2 },
  F: { name:'F', preds:['C','D'],normalTime:5,  crashTime:4, normalCost:40,  crashCost:70,  slope:30, maxCrash:1 },
  G: { name:'G', preds:['E','F'],normalTime:6,  crashTime:6, normalCost:70,  crashCost:70,  slope:0,  maxCrash:0 }
};

const ALL_PATHS = [
  { nodes:['A','B','E','G'], label:'A \u2192 B \u2192 E \u2192 G' },
  { nodes:['A','C','F','G'], label:'A \u2192 C \u2192 F \u2192 G' },
  { nodes:['A','D','F','G'], label:'A \u2192 D \u2192 F \u2192 G' }
];

const TOPO = ['A','B','C','D','E','F','G'];

// ============================================================
// STATE
// ============================================================
let S = null;

function initState() {
  S = {
    dur: {},
    crashed: {},
    directCost: 0,
    round: 0,
    history: [],
    selected: new Set(),
    phase: 'intro',
    costLog: [],
    showIndirect: false
  };
  for (const [k,v] of Object.entries(ACTIVITIES)) {
    S.dur[k] = v.normalTime;
    S.crashed[k] = 0;
  }
  S.directCost = Object.values(ACTIVITIES).reduce((s,a) => s + a.normalCost, 0);
  const d = projDur();
  const ic = indirectCost(d);
  S.costLog = [{ duration:d, direct:S.directCost, indirect:ic, total:S.directCost+ic }];
}

// ============================================================
// CALCULATIONS
// ============================================================
function pathDur(p) { return p.nodes.reduce((s,n) => s + S.dur[n], 0); }
function projDur() { return Math.max(...ALL_PATHS.map(pathDur)); }
function critPaths() { const m = projDur(); return ALL_PATHS.filter(p => pathDur(p) === m); }
function indirectCost(d) { return Math.max(0, 400 - (25 - d) * 50); }
function canCrash(n) { return S.crashed[n] < ACTIVITIES[n].maxCrash; }
function remaining(n) { return ACTIVITIES[n].maxCrash - S.crashed[n]; }

function coversAll(sel) {
  return critPaths().every(cp => cp.nodes.some(n => sel.has(n)));
}

function roundCost(sel) {
  return [...sel].reduce((s,n) => s + ACTIVITIES[n].slope, 0);
}

function schedule() {
  const es={}, ef={}, ls={}, lf={};
  const succs = {};
  for (const n of TOPO) succs[n] = [];
  for (const n of TOPO) for (const p of ACTIVITIES[n].preds) succs[p].push(n);

  for (const n of TOPO) {
    const pr = ACTIVITIES[n].preds;
    es[n] = pr.length ? Math.max(...pr.map(p => ef[p])) : 0;
    ef[n] = es[n] + S.dur[n];
  }
  const pd = projDur();
  for (const n of [...TOPO].reverse()) {
    lf[n] = succs[n].length ? Math.min(...succs[n].map(s => ls[s])) : pd;
    ls[n] = lf[n] - S.dur[n];
  }
  const r = {};
  for (const n of TOPO) r[n] = { es:es[n], ef:ef[n], ls:ls[n], lf:lf[n], slack:ls[n]-es[n] };
  return r;
}

function crashableOnCritical() {
  const cps = critPaths();
  const on = new Set();
  cps.forEach(cp => cp.nodes.forEach(n => on.add(n)));
  return [...on].filter(canCrash);
}

// Check if ANY critical path has ALL its activities maxed out (remaining=0)
// If so, that path can never be shortened → project cannot be shortened further
function anyPathFullyMaxed() {
  const cps = critPaths();
  return cps.some(cp => cp.nodes.every(n => remaining(n) === 0));
}

// Get which critical paths are fully maxed
function getMaxedPaths() {
  const cps = critPaths();
  return cps.filter(cp => cp.nodes.every(n => remaining(n) === 0));
}

// ============================================================
// RENDER MAIN
// ============================================================
function render() {
  const app = document.getElementById('app');
  if (S.phase === 'intro') app.innerHTML = renderIntro();
  else if (S.phase === 'crashing') app.innerHTML = renderCrashing();
  else app.innerHTML = renderComplete();
  if (S.phase !== 'intro') drawChart();
}

// ============================================================
// INTRO
// ============================================================
function renderIntro() {
  const sch = schedule();
  const d = projDur();
  const cps = critPaths();
  const ic = indirectCost(d);
  const tc = S.directCost + ic;

  return `
    <div class="card">
      <h2>📋 專案活動資料表</h2>
      <p style="margin-bottom:14px;color:var(--muted)">包含正常與趕工時間及成本，以及成本斜率 (Cost Slope)。</p>
      ${dataTable()}
    </div>
    <div class="card">
      <h2>🔗 AON 網路圖</h2>
      <p style="margin-bottom:14px;color:var(--muted)">活動節點網路 (Activity-on-Node)，粗紅線 = 要徑。</p>
      <div style="text-align:center;overflow-x:auto">${networkSVG(sch, cps)}</div>
    </div>
    <div class="card">
      <h2>📊 初始分析</h2>
      <div class="status-bar">
        <div class="stat-box"><div class="label">專案工期</div><div class="value">${d} 天</div></div>
        <div class="stat-box"><div class="label">直接成本</div><div class="value">$${S.directCost}</div></div>
        <div class="stat-box"><div class="label">間接成本</div><div class="value">$${ic}</div></div>
        <div class="stat-box highlight"><div class="label">總成本</div><div class="value">$${tc}</div></div>
      </div>
      ${pathList(cps, d)}
      <div class="msg msg-info">
        <strong>💡 說明：</strong>目前工期 ${d} 天，總成本 $${tc}（直接 $${S.directCost} + 間接 $${ic}）。<br>
        趕工（Crashing）可縮短要徑上的活動以減少間接成本，但會增加直接成本。<br>
        目標：找到<strong>最佳成本-時間點（Optimum Cost-Time Point）</strong>，使總成本最低。
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="S.phase='crashing';render()">開始趕工模擬 →</button>
      </div>
    </div>`;
}

// ============================================================
// CRASHING PHASE
// ============================================================
function renderCrashing() {
  const sch = schedule();
  const d = projDur();
  const cps = critPaths();
  const ic = indirectCost(d);
  const tc = S.directCost + ic;
  const pathMaxed = anyPathFullyMaxed();
  const canDo = !pathMaxed && crashableOnCritical().length > 0;
  const optDur = findOptimum().duration;

  return `
    <div class="card">
      <h2>📋 專案活動資料表（參考用）</h2>
      ${dataTable()}
    </div>
    <div class="status-bar">
      <div class="stat-box"><div class="label">回合</div><div class="value">${S.round}</div></div>
      <div class="stat-box"><div class="label">工期</div><div class="value">${d} 天</div></div>
      <div class="stat-box"><div class="label">直接成本</div><div class="value">$${S.directCost}</div></div>
      ${S.showIndirect ? `
        <div class="stat-box"><div class="label">間接成本</div><div class="value">$${ic}</div></div>
        <div class="stat-box highlight"><div class="label">總成本</div><div class="value">$${tc}</div></div>
        <div class="stat-box ${d===optDur?'optimum':''}"><div class="label">最佳點</div><div class="value">${d===optDur?'✓ 此點':'—'}</div></div>
      ` : ''}
    </div>
    <div class="two-col">
      <div>
        <div class="card">
          <h2>🔗 AON 網路圖</h2>
          <div style="text-align:center;overflow-x:auto">${networkSVG(sch, cps)}</div>
        </div>
        <div class="card">
          <h2>📊 成本-工期圖</h2>
          <div class="toggle-row">
            <label class="toggle-switch">
              <input type="checkbox" ${S.showIndirect?'checked':''} onchange="S.showIndirect=this.checked;render()">
              <span class="toggle-slider"></span>
            </label>
            <span>顯示間接成本與總成本</span>
          </div>
          <div class="chart-container"><canvas id="costChart"></canvas></div>
        </div>
      </div>
      <div>
        <div class="card">
          <h2>⚡ 第 ${S.round+1} 回合趕工</h2>
          ${crashPanel(cps, canDo)}
        </div>
        <div class="card">
          <h2>📜 趕工歷程</h2>
          ${S.history.length===0?'<p style="color:var(--muted)">尚未開始趕工。</p>':''}
          ${[...S.history].reverse().map(h => `
            <div class="history-step">
              <div class="step-title">第 ${h.round} 回合：${h.prevDur} → ${h.dur} 天</div>
              <div class="step-detail">
                趕工：${h.acts.map(a=>`${a}($${ACTIVITIES[a].slope})`).join(' + ')} = $${h.rc}<br>
                直接 $${h.dc}｜間接 $${h.ic}｜<strong>總成本 $${h.tc}</strong>
              </div>
            </div>`).join('')}
        </div>
      </div>
    </div>
    <div class="card">
      <h2>📋 活動狀態表</h2>
      ${statusTable(sch)}
    </div>`;
}

function crashPanel(cps, canDo) {
  if (!canDo) {
    const maxedPs = getMaxedPaths();
    const reason = maxedPs.length > 0
      ? `要徑「${maxedPs.map(p=>p.label).join('」、「')}」上所有活動皆已達極限（標記 x），即使再投入資源也無法縮短專案工期。`
      : '要徑上已無可趕工的活動，無法繼續縮短工期。';
    return `
      <div class="msg msg-warning"><strong>⚠️</strong> ${reason}</div>
      <div class="btn-group"><button class="btn btn-success" onclick="S.phase='complete';render()">完成模擬 →</button></div>`;
  }

  const onCrit = new Set();
  cps.forEach(cp => cp.nodes.forEach(n => onCrit.add(n)));
  const acts = TOPO.filter(n => onCrit.has(n));

  const coverage = cps.map((cp,i) => {
    const covered = cp.nodes.some(n => S.selected.has(n));
    return `<div class="cp-item is-critical">
      路徑 ${i+1}：${cp.label}（${pathDur(cp)} 天）
      ${covered ? '<span class="tag tag-slack">✓ 已覆蓋</span>' : '<span class="tag tag-critical">✗ 未覆蓋</span>'}
    </div>`;
  }).join('');

  const options = acts.map(n => {
    const rem = remaining(n);
    const isMaxed = rem === 0;
    const sel = S.selected.has(n);
    const onWhich = cps.map((cp,i) => cp.nodes.includes(n) ? `路徑${i+1}` : null).filter(Boolean).join(', ');
    return `<label class="crash-option ${sel?'selected':''} ${isMaxed?'disabled':''}">
      <input type="checkbox" ${sel?'checked':''} ${isMaxed?'disabled':''}
        onchange="toggleSel('${n}',this.checked)">
      <span class="act-name">${n}</span>
      <span class="act-info">
        ${isMaxed ? S.dur[n]+' 天（已達極限）' : S.dur[n]+' → '+(S.dur[n]-1)+' 天｜剩餘 '+rem}｜${onWhich}
      </span>
      <span class="act-slope">${isMaxed?'已達極限':'$'+ACTIVITIES[n].slope}</span>
    </label>`;
  }).join('');

  const allCov = coversAll(S.selected);
  let valMsg = '';
  if (S.selected.size === 0) {
    valMsg = '<div class="msg msg-info">請選擇要趕工的活動。每個活動本回合縮短 1 天。</div>';
  } else if (!allCov) {
    const uncov = cps.filter(cp => !cp.nodes.some(n => S.selected.has(n)));
    valMsg = `<div class="msg msg-error"><strong>⚠️ 尚未覆蓋所有要徑！</strong><br>
      ${uncov.map(c => `「${c.label}」未被覆蓋`).join('、')}，請選擇該路徑上的活動。</div>`;
  } else {
    valMsg = '<div class="msg msg-success"><strong>✓ 所有要徑已覆蓋！</strong>可以確認趕工。</div>';
  }

  return `
    <div class="cp-list">
      <h4>🔴 目前要徑（${cps.length} 條）— 必須全部覆蓋才能縮短工期</h4>
      ${coverage}
    </div>
    <p style="margin-bottom:8px;color:var(--muted);font-size:13px">選擇要趕工的活動：</p>
    <div>${options}</div>
    ${valMsg}
    <div style="display:flex;align-items:center;gap:12px;margin-top:10px">
      <span style="font-size:15px">本回合趕工成本：</span>
      <span style="font-size:22px;font-weight:700;color:var(--accent)">$${roundCost(S.selected)}</span>
    </div>
    <div class="btn-group">
      <button class="btn btn-danger" ${!allCov?'disabled':''} onclick="execCrash()">確認趕工（縮短 1 天）</button>
      <button class="btn btn-outline" onclick="S.phase='complete';render()">結束趕工</button>
      <button class="btn btn-outline" onclick="initState();render()">重新開始</button>
    </div>`;
}

// ============================================================
// COMPLETE PHASE
// ============================================================
function renderComplete() {
  const opt = findOptimum();
  return `
    <div class="completion-banner">
      <h3>🎉 趕工模擬完成！</h3>
      <p>以下是完整的成本-工期分析結果</p>
    </div>
    <div class="card">

// ============================================================
// NETWORK SVG
// ============================================================
function networkSVG(sch, cps) {
  const W=680, H=280, bw=90, bh=56;
  const pos = {
    A:{x:60,y:112}, B:{x:220,y:20}, C:{x:220,y:112}, D:{x:220,y:204},
    E:{x:400,y:20}, F:{x:400,y:158}, G:{x:560,y:112}
  };
  const edges = [['A','B'],['A','C'],['A','D'],['B','E'],['C','F'],['D','F'],['E','G'],['F','G']];
  const critEdges = new Set();
  cps.forEach(cp => { for(let i=0;i<cp.nodes.length-1;i++) critEdges.add(cp.nodes[i]+'-'+cp.nodes[i+1]); });
  const critActs = new Set();
  cps.forEach(cp => cp.nodes.forEach(n => critActs.add(n)));

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="font-family:sans-serif">`;
  svg += `<defs>
    <marker id="ar" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#bdc3c7"/></marker>
    <marker id="arc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="#e74c3c"/></marker>
  </defs>`;

  for (const [f,t] of edges) {
    const fp=pos[f], tp=pos[t];
    const ic = critEdges.has(f+'-'+t);
    const fcx=fp.x+bw/2, fcy=fp.y+bh/2, tcx=tp.x+bw/2, tcy=tp.y+bh/2;
    const s = clipBox(fcx,fcy,tcx,tcy,fp.x,fp.y,bw,bh);
    const e = clipBox(tcx,tcy,fcx,fcy,tp.x,tp.y,bw,bh);
    svg += `<line x1="${s.x}" y1="${s.y}" x2="${e.x}" y2="${e.y}" stroke="${ic?'#e74c3c':'#bdc3c7'}" stroke-width="${ic?3:1.5}" marker-end="url(#${ic?'arc':'ar'})"/>`;
  }

  for (const n of TOPO) {
    const p=pos[n], ic=critActs.has(n), s=sch[n];
    const rem = ACTIVITIES[n].maxCrash - S.crashed[n];
    const maxedOut = rem === 0;
    const wasChanged = S.crashed[n] > 0;
    svg += `<rect x="${p.x}" y="${p.y}" width="${bw}" height="${bh}" rx="6" fill="${ic?'#fdecea':'#eaf2f8'}" stroke="${ic?'#e74c3c':'#2980b9'}" stroke-width="${ic?2.5:1.5}"/>`;
    svg += `<text x="${p.x+bw/2}" y="${p.y+22}" text-anchor="middle" font-size="16" font-weight="700" fill="${ic?'#c0392b':'#1a5276'}">${n}</text>`;
    svg += `<text x="${p.x+bw/2}" y="${p.y+42}" text-anchor="middle" font-size="13" fill="${wasChanged?'#e74c3c':'#555'}">${S.dur[n]}${maxedOut?'x':''}</text>`;
    if (s.slack>0) svg += `<text x="${p.x+bw-6}" y="${p.y+14}" text-anchor="end" font-size="9" fill="#27ae60">S=${s.slack}</text>`;
  }
  svg += '</svg>';
  return svg;
}

function clipBox(fx,fy,tx,ty,bx,by,bw,bh) {
  const dx=tx-fx, dy=ty-fy;
  let best=Infinity;
  if(dx!==0){for(const edge of [bx-fx, bx+bw-fx]){const t=edge/dx; if(t>0){const y=fy+t*dy; if(y>=by&&y<=by+bh&&t<best) best=t;}}}
  if(dy!==0){for(const edge of [by-fy, by+bh-fy]){const t=edge/dy; if(t>0){const x=fx+t*dx; if(x>=bx&&x<=bx+bw&&t<best) best=t;}}}
  return best<Infinity?{x:fx+best*dx, y:fy+best*dy}:{x:fx,y:fy};
}

// ============================================================
// COST CHART (Canvas) — legend below chart, proper sizing
// ============================================================
function drawChart() {
  const canvas = document.getElementById('costChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const ctr = canvas.parentElement;
  const cw = ctr.offsetWidth, ch = ctr.offsetHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = cw * dpr;
  canvas.height = ch * dpr;
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  ctx.scale(dpr, dpr);

  const data = S.costLog;
  if (data.length < 1) return;

  // Generous margins: extra bottom space for legend below the axis
  const mg = { t: 20, r: 20, b: 70, l: 60 };
  const pw = cw - mg.l - mg.r;
  const ph = ch - mg.t - mg.b;

  const durs = data.map(d => d.duration);
  // Determine cost range based on what's visible
  let allC = data.map(d => d.direct);
  if (S.showIndirect) allC = allC.concat(data.map(d => d.indirect), data.map(d => d.total));
  const minD = Math.min(...durs) - 0.5, maxD = Math.max(...durs) + 0.5;
  const maxC = Math.ceil(Math.max(...allC) / 100) * 100 + 50;

  const xS = d => mg.l + (maxD - d) / (maxD - minD) * pw;
  const yS = c => mg.t + (1 - c / maxC) * ph;

  ctx.clearRect(0, 0, cw, ch);

  // Background for plot area
  ctx.fillStyle = '#fafbfc';
  ctx.fillRect(mg.l, mg.t, pw, ph);

  // Grid lines
  ctx.strokeStyle = '#e8ecf0';
  ctx.lineWidth = 0.5;
  for (let c = 0; c <= maxC; c += 100) {
    const y = yS(c);
    if (y >= mg.t && y <= mg.t + ph) {
      ctx.beginPath(); ctx.moveTo(mg.l, y); ctx.lineTo(mg.l + pw, y); ctx.stroke();
    }
  }

  // Axes
  ctx.strokeStyle = '#7f8c8d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(mg.l, mg.t);
  ctx.lineTo(mg.l, mg.t + ph);
  ctx.lineTo(mg.l + pw, mg.t + ph);
  ctx.stroke();

  // X axis labels
  ctx.fillStyle = '#555';
  ctx.font = '12px sans-serif';
  ctx.textAlign = 'center';
  for (const d of durs) ctx.fillText(d + ' 天', xS(d), mg.t + ph + 18);
  ctx.fillText('工期（天）', mg.l + pw / 2, mg.t + ph + 36);

  // Y axis labels
  ctx.textAlign = 'right';
  for (let c = 0; c <= maxC; c += 100) {
    const y = yS(c);
    if (y >= mg.t - 5 && y <= mg.t + ph + 5) ctx.fillText('$' + c, mg.l - 8, y + 4);
  }
  ctx.save();
  ctx.translate(14, mg.t + ph / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.fillText('成本（$）', 0, 0);
  ctx.restore();

  const sorted = [...data].sort((a, b) => b.duration - a.duration);

  // Draw a data line with dots and per-point value labels
  function drawLine(fn, col, dash, showLabels) {
    ctx.strokeStyle = col;
    ctx.lineWidth = 2.5;
    ctx.setLineDash(dash ? [6, 4] : []);
    ctx.beginPath();
    sorted.forEach((d, i) => {
      const x = xS(d.duration), y = yS(fn(d));
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
    ctx.setLineDash([]);

    // Dots
    sorted.forEach(d => {
      const x = xS(d.duration), y = yS(fn(d));
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = col;
      ctx.fill();
    });

    // Value labels on dots
    if (showLabels && sorted.length > 1) {
      ctx.font = '11px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = col;
      sorted.forEach(d => {
        const x = xS(d.duration), y = yS(fn(d));
        ctx.fillText('$' + fn(d), x, y - 10);
      });
    }
  }

  // Always draw direct cost
  drawLine(d => d.direct, '#2980b9', true, !S.showIndirect);

  // Conditionally draw indirect + total
  if (S.showIndirect) {
    drawLine(d => d.indirect, '#3498db', true, false);
    drawLine(d => d.total, '#e74c3c', false, true);

    // Optimum marker
    const opt = findOptimum();
    if (data.length > 1) {
      const ox = xS(opt.duration), oy = yS(opt.total);
      ctx.beginPath();
      ctx.arc(ox, oy, 10, 0, Math.PI * 2);
      ctx.strokeStyle = '#27ae60';
      ctx.lineWidth = 2.5;
      ctx.stroke();
      ctx.fillStyle = '#27ae60';
      ctx.font = 'bold 12px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('最佳 $' + opt.total, ox, oy - 16);
    }
  }

  // Legend — drawn BELOW the chart, outside the plot area
  const legendY = mg.t + ph + 52;
  const legends = S.showIndirect
    ? [
        { l: '直接成本', c: '#2980b9', dash: true },
        { l: '間接成本', c: '#3498db', dash: true },
        { l: '總成本',   c: '#e74c3c', dash: false }
      ]
    : [{ l: '直接成本', c: '#2980b9', dash: true }];

  const legendTotalW = legends.length * 110;
  let legendX = mg.l + (pw - legendTotalW) / 2;

  legends.forEach(it => {
    ctx.strokeStyle = it.c;
    ctx.lineWidth = 2;
    ctx.setLineDash(it.dash ? [6, 4] : []);
    ctx.beginPath();
    ctx.moveTo(legendX, legendY);
    ctx.lineTo(legendX + 24, legendY);
    ctx.stroke();
    ctx.setLineDash([]);
    // dot on legend line
    ctx.beginPath();
    ctx.arc(legendX + 12, legendY, 3, 0, Math.PI * 2);
    ctx.fillStyle = it.c;
    ctx.fill();
    // text
    ctx.fillStyle = '#333';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(it.l, legendX + 30, legendY + 4);
    legendX += 110;
  });
}

function findOptimum() {
  let o=S.costLog[0];
  for(const c of S.costLog) if(c.total<o.total) o=c;
  return o;
}

// ============================================================
// OPTIMAL SOLVER — two modes depending on showIndirect
//   mode='duration': crash as cheaply as possible each round (no stop limit)
//   mode='total':    stop when marginal crash cost > indirect saving ($50/day)
// ============================================================
function solveOptimal(mode) {
  const dur = {}, crashed = {};
  for (const n of TOPO) { dur[n] = ACTIVITIES[n].normalTime; crashed[n] = 0; }
  let dc = Object.values(ACTIVITIES).reduce((s,a) => s + a.normalCost, 0);
  const indirectPerDay = 50;

  function simPathDur(p) { return p.nodes.reduce((s,n) => s + dur[n], 0); }
  function simProjDur() { return Math.max(...ALL_PATHS.map(simPathDur)); }
  function simCritPaths() { const m = simProjDur(); return ALL_PATHS.filter(p => simPathDur(p) === m); }
  function simRemaining(n) { return ACTIVITIES[n].maxCrash - crashed[n]; }
  function simAnyPathMaxed() {
    return simCritPaths().some(cp => cp.nodes.every(n => simRemaining(n) === 0));
  }

  function findCheapestCover(cps) {
    const cpNodes = cps.map(cp => cp.nodes.filter(n => simRemaining(n) > 0));
    if (cpNodes.some(ns => ns.length === 0)) return null;
    let bestCombo = null, bestCost = Infinity;
    function search(cpIdx, chosen) {
      if (cpIdx >= cps.length) {
        const chosenSet = new Set(chosen);
        const allCovered = cps.every(cp => cp.nodes.some(n => chosenSet.has(n)));
        if (allCovered) {
          const cost = [...chosenSet].reduce((s,n) => s + ACTIVITIES[n].slope, 0);
          if (cost < bestCost) { bestCost = cost; bestCombo = [...chosenSet]; }
        }
        return;
      }
      const chosenSet = new Set(chosen);
      if (cps[cpIdx].nodes.some(n => chosenSet.has(n))) {
        search(cpIdx + 1, chosen);
      } else {
        for (const n of cpNodes[cpIdx]) search(cpIdx + 1, [...chosen, n]);
      }
    }
    search(0, []);
    return bestCombo ? { acts: bestCombo.sort(), cost: bestCost } : null;
  }

  const steps = [];
  const costLog = [{ duration: simProjDur(), direct: dc, indirect: indirectCost(simProjDur()), total: dc + indirectCost(simProjDur()) }];

  while (true) {
    if (simAnyPathMaxed()) break;
    const cps = simCritPaths();
    const best = findCheapestCover(cps);
    if (!best) break;
    // In 'total' mode, stop if marginal cost exceeds indirect saving
    if (mode === 'total' && best.cost > indirectPerDay) break;

    const prevDur = simProjDur();
    for (const n of best.acts) { dur[n] -= 1; crashed[n] += 1; }
    dc += best.cost;
    const newDur = simProjDur();
    const ic = indirectCost(newDur);
    steps.push({ round: steps.length+1, prevDur, dur: newDur, acts: best.acts, rc: best.cost, dc, ic, tc: dc+ic });
    costLog.push({ duration: newDur, direct: dc, indirect: ic, total: dc+ic });
    if (newDur >= prevDur) break;
  }

  let optEntry = costLog[0];
  for (const c of costLog) if (c.total < optEntry.total) optEntry = c;
  // For duration mode, the "best" is the last entry (maximum compression)
  const bestDurEntry = costLog[costLog.length - 1];

  return { steps, costLog, optimum: optEntry, shortest: bestDurEntry };
}

// COMPARISON — adapts to showIndirect toggle
// ============================================================
function renderComparison() {
  if (S.showIndirect) return renderComparisonTotal();
  return renderComparisonDuration();
}

// --- MODE 1: Direct cost only — compare duration reduction path ---
function renderComparisonDuration() {
  const opt = solveOptimal('duration');
  const userSteps = S.history;
  // User's final duration
  const userFinalDur = userSteps.length > 0 ? userSteps[userSteps.length-1].dur : S.costLog[0].duration;
  const optFinalDur = opt.shortest.duration;
  // User's total direct cost at same number of rounds
  const userFinalDC = userSteps.length > 0 ? userSteps[userSteps.length-1].dc : S.costLog[0].direct;

  // Compare step by step (only the rounds the user actually did)
  let firstDiffRound = -1;
  const cmpLen = Math.max(userSteps.length, opt.steps.length);
  for (let i = 0; i < userSteps.length; i++) {
    const us = userSteps[i], os = opt.steps[i];
    if (!os) break; // user did more rounds than possible — shouldn't happen
    const uKey = [...us.acts].sort().join(',');
    const oKey = [...os.acts].sort().join(',');
    if (uKey !== oKey) { firstDiffRound = i; break; }
  }

  // Check: did user pick cheapest option each round?
  // Compare direct cost at the same duration level
  const userDCAtDur = {};
  S.costLog.forEach(c => { userDCAtDur[c.duration] = c.direct; });
  const optDCAtDur = {};
  opt.costLog.forEach(c => { optDCAtDur[c.duration] = c.direct; });

  // Is every round optimal?
  const allRoundsOptimal = firstDiffRound === -1 && userSteps.length <= opt.steps.length;

  if (allRoundsOptimal) {
    return `
      <div class="card" style="border-color:var(--success)">
        <h2 style="color:var(--success);border-color:var(--success)">🏆 恭喜！您每回合都選擇了最低成本的趕工方案！</h2>
        <p>在您執行的 ${userSteps.length} 回合中，每次都挑選了覆蓋所有要徑且成本最低的活動組合。</p>
        <p style="margin-top:8px">工期從 ${S.costLog[0].duration} 天縮短至 <strong>${userFinalDur} 天</strong>，
        累計直接成本 <strong>$${userFinalDC}</strong>。</p>
        ${userSteps.length < opt.steps.length
          ? `<p style="margin-top:8px;color:var(--muted)">提示：此專案最多還可再縮短至 ${optFinalDur} 天（還有 ${opt.steps.length - userSteps.length} 回合可執行）。</p>`
          : `<p style="margin-top:8px;color:var(--muted)">您已將工期壓縮到極限 ${optFinalDur} 天。</p>`}
      </div>`;
  }

  // Not optimal — show diff
  let html = `<div class="card" style="border-color:var(--warning)">
    <h2 style="color:#7d6608;border-color:var(--warning)">📝 與最佳解的比較（以最低直接成本縮短工期）</h2>`;

  // Find the optimal direct cost at the user's final duration
  const optDCForUserDur = optDCAtDur[userFinalDur];
  if (optDCForUserDur !== undefined && userFinalDC > optDCForUserDur) {
    html += `<div class="msg msg-warning">
      <strong>您的結果：</strong>工期 ${userFinalDur} 天，直接成本 $${userFinalDC}<br>
      <strong>最佳解：</strong>同樣縮短至 ${userFinalDur} 天，直接成本只需 $${optDCForUserDur}<br>
      <strong>差異：</strong>直接成本多花了 <strong>$${userFinalDC - optDCForUserDur}</strong>
    </div>`;
  } else {
    html += `<div class="msg msg-warning">
      <strong>您的結果：</strong>工期 ${userFinalDur} 天，直接成本 $${userFinalDC}<br>
      <strong>提示：</strong>部分回合的活動選擇並非最低成本方案。
    </div>`;
  }

  if (firstDiffRound >= 0) {
    const roundNum = firstDiffRound + 1;
    const us = userSteps[firstDiffRound];
    const os = opt.steps[firstDiffRound];
    html += `<div class="msg msg-error">
      <strong>⚠️ 從第 ${roundNum} 回合開始出現差異：</strong><br>
      您選擇了 <strong>${us.acts.join(' + ')}</strong>（成本 $${us.rc}）<br>
      最低成本選擇為 <strong>${os.acts.join(' + ')}</strong>（成本 $${os.rc}）<br>
      ${os.rc < us.rc
        ? `若選擇 ${os.acts.join('+')}，本回合可省下 $${us.rc - os.rc}。`
        : `雖然本回合成本相同，但此選擇影響了後續回合的可用方案與成本。`}
    </div>`;
  }

  // Round-by-round table
  html += roundTable(userSteps, opt.steps);

  // Optimal duration-mode cost summary
  html += `<h3 style="margin-top:16px;margin-bottom:8px;font-size:15px;color:var(--primary)">最佳解：各回合直接成本</h3>
    <table>
      <thead><tr><th>工期</th><th>直接成本</th><th>趕工活動</th><th>回合成本</th></tr></thead>
      <tbody>
        <tr><td>${opt.costLog[0].duration} 天</td><td>$${opt.costLog[0].direct}</td><td>（初始）</td><td>—</td></tr>
        ${opt.steps.map(s => `
          <tr><td>${s.dur} 天</td><td>$${s.dc}</td><td>${s.acts.join(' + ')}</td><td>$${s.rc}</td></tr>`).join('')}
      </tbody>
    </table>`;

  html += '</div>';
  return html;
}

// --- MODE 2: Total cost — compare against optimum cost-time point ---
function renderComparisonTotal() {
  const opt = solveOptimal('total');
  const userOpt = findOptimum();
  const userSteps = S.history;

  // Find first divergence
  let firstDiffRound = -1;
  const maxR = Math.max(userSteps.length, opt.steps.length);
  for (let i = 0; i < maxR; i++) {
    const us = userSteps[i], os = opt.steps[i];
    if (!us && !os) break;
    if (!us || !os) { firstDiffRound = i; break; }
    const uKey = [...us.acts].sort().join(',');
    const oKey = [...os.acts].sort().join(',');
    if (uKey !== oKey) { firstDiffRound = i; break; }
  }

  const isOptimal = userOpt.total === opt.optimum.total
    && userOpt.duration === opt.optimum.duration
    && firstDiffRound === -1;

  if (isOptimal) {
    return `
      <div class="card" style="border-color:var(--success)">
        <h2 style="color:var(--success);border-color:var(--success)">🏆 恭喜！您的趕工策略是最佳解！</h2>
        <p>您在每一回合都選擇了成本最低的趕工方案，並在正確的時間點停止趕工。</p>
        <p style="margin-top:8px">最佳工期 <strong>${opt.optimum.duration} 天</strong>，最低總成本 <strong>$${opt.optimum.total}</strong>
        （直接 $${opt.optimum.direct} + 間接 $${opt.optimum.indirect}）。</p>
      </div>`;
  }

  // Not optimal
  let html = `<div class="card" style="border-color:var(--warning)">
    <h2 style="color:#7d6608;border-color:var(--warning)">📝 與最佳解的比較（最低總成本）</h2>`;

  const costDiff = userOpt.total - opt.optimum.total;
  const durDiff = userOpt.duration - opt.optimum.duration;
  html += `<div class="msg msg-warning">
    <strong>您的最佳點：</strong>工期 ${userOpt.duration} 天，總成本 $${userOpt.total}（直接 $${userOpt.direct} + 間接 $${userOpt.indirect}）<br>
    <strong>理想最佳點：</strong>工期 ${opt.optimum.duration} 天，總成本 $${opt.optimum.total}（直接 $${opt.optimum.direct} + 間接 $${opt.optimum.indirect}）<br>
    <strong>差異：</strong>總成本多了 <strong>$${costDiff}</strong>${durDiff !== 0 ? '，工期' + (durDiff > 0 ? '長' : '短') + '了 ' + Math.abs(durDiff) + ' 天' : ''}
  </div>`;

  if (firstDiffRound >= 0) {
    const roundNum = firstDiffRound + 1;
    const us = userSteps[firstDiffRound];
    const os = opt.steps[firstDiffRound];

    if (us && os) {
      html += `<div class="msg msg-error">
        <strong>⚠️ 從第 ${roundNum} 回合開始出現差異：</strong><br>
        您選擇了 <strong>${us.acts.join(' + ')}</strong>（成本 $${us.rc}）<br>
        最佳選擇為 <strong>${os.acts.join(' + ')}</strong>（成本 $${os.rc}）<br>
        ${os.rc < us.rc
          ? `選擇 ${os.acts.join('+')} 每回合可省下 $${us.rc - os.rc}。`
          : `雖然單回合成本相同，但此選擇會影響後續回合的可用方案。`}
      </div>`;
    } else if (!us && os) {
      html += `<div class="msg msg-error">
        <strong>⚠️ 您在第 ${roundNum} 回合前停止了趕工。</strong><br>
        最佳解會繼續第 ${roundNum} 回合：趕工 <strong>${os.acts.join(' + ')}</strong>（成本 $${os.rc}），
        因為趕工成本 $${os.rc} 仍小於間接成本每天節省的 $50，總成本仍會下降。
      </div>`;
    } else if (us && !os) {
      html += `<div class="msg msg-error">
        <strong>⚠️ 您在第 ${roundNum} 回合多做了不必要的趕工。</strong><br>
        此時趕工成本 $${us.rc} 已超過間接成本每天節省的 $50，繼續趕工反而增加總成本。<br>
        最佳策略是在第 ${roundNum} 回合前停止。
      </div>`;
    }
  } else if (userSteps.length !== opt.steps.length) {
    if (userSteps.length < opt.steps.length) {
      const next = opt.steps[userSteps.length];
      html += `<div class="msg msg-error">
        <strong>⚠️ 您提早停止了趕工。</strong><br>
        最佳解還會繼續第 ${userSteps.length+1} 回合：趕工 <strong>${next.acts.join(' + ')}</strong>（成本 $${next.rc}），
        因為 $${next.rc} &lt; $50（間接成本每天節省量），仍然值得。
      </div>`;
    } else {
      html += `<div class="msg msg-error">
        <strong>⚠️ 您多做了 ${userSteps.length - opt.steps.length} 回合趕工。</strong><br>
        從第 ${opt.steps.length+1} 回合起，趕工成本已超過間接成本每天節省的 $50，不應該繼續。
      </div>`;
    }
  }

  html += roundTable(userSteps, opt.steps);

  // Optimal total-cost summary
  html += `<h3 style="margin-top:16px;margin-bottom:8px;font-size:15px;color:var(--primary)">最佳解成本彙總</h3>
    <table>
      <thead><tr><th>工期</th><th>直接成本</th><th>間接成本</th><th>總成本</th><th>備註</th></tr></thead>
      <tbody>
        ${opt.costLog.map(c => `
          <tr style="${c.duration===opt.optimum.duration?'background:#eafaf1;font-weight:700':''}">
            <td>${c.duration} 天</td><td>$${c.direct}</td><td>$${c.indirect}</td><td>$${c.total}</td>
            <td>${c.duration===opt.optimum.duration?'⭐ 最佳成本-時間點':''}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;

  html += '</div>';
  return html;
}

// Shared round-by-round comparison table
function roundTable(userSteps, optSteps) {
  const maxR = Math.max(userSteps.length, optSteps.length);
  let html = `<h3 style="margin-top:16px;margin-bottom:8px;font-size:15px;color:var(--primary)">逐回合對比</h3>
    <table>
      <thead>
        <tr><th>回合</th><th colspan="2">您的選擇</th><th colspan="2">最佳選擇</th><th>結果</th></tr>
        <tr><th></th><th>趕工活動</th><th>成本</th><th>趕工活動</th><th>成本</th><th></th></tr>
      </thead><tbody>`;
  for (let i = 0; i < maxR; i++) {
    const us = userSteps[i], os = optSteps[i];
    const uA = us ? us.acts.join('+') : '—';
    const uC = us ? '$'+us.rc : '—';
    const oA = os ? os.acts.join('+') : '—';
    const oC = os ? '$'+os.rc : '—';
    let diff='', sty='';
    if (us && os) {
      const match = [...us.acts].sort().join(',') === [...os.acts].sort().join(',');
      diff = match ? '✓ 一致' : '✗ 不同';
      sty = match ? 'background:#eafaf1' : 'background:#fdecea';
    } else if (us && !os) { diff='✗ 多餘'; sty='background:#fdecea'; }
    else { diff='✗ 缺少'; sty='background:#fdecea'; }
    html += `<tr style="${sty}"><td>${i+1}</td><td>${uA}</td><td>${uC}</td><td>${oA}</td><td>${oC}</td><td>${diff}</td></tr>`;
  }
  html += '</tbody></table>';
  return html;
}

// ============================================================
// ACTIONS
// ============================================================
function toggleSel(n, checked) {
  if(checked) S.selected.add(n); else S.selected.delete(n);
  render();
}

function execCrash() {
  if(!coversAll(S.selected)) return;
  const prevD = projDur();
  const acts = [...S.selected];
  const rc = roundCost(S.selected);

  for(const n of acts){ S.dur[n]-=1; S.crashed[n]+=1; }
  S.directCost += rc;
  S.round += 1;

  const newD = projDur();
  const ic = indirectCost(newD);
  const tc = S.directCost + ic;

  S.history.push({ round:S.round, prevDur:prevD, dur:newD, acts, rc, dc:S.directCost, ic, tc });
  S.costLog.push({ duration:newD, direct:S.directCost, indirect:ic, total:tc });
  S.selected = new Set();
  render();
}

// ============================================================
// INIT
// ============================================================
initState();
render();
window.addEventListener('resize', () => { if(S.phase!=='intro') drawChart(); });
</script>
